##############################################################
# Helpdesk — Configuration Nginx (vhost Ubuntu 22.04)
# Chemin cible : /etc/nginx/sites-available/helpdesk
# Activer : ln -s /etc/nginx/sites-available/helpdesk /etc/nginx/sites-enabled/
##############################################################

server {
    listen 80;
    server_name helpdesk.local _;   # helpdesk.local via mDNS (avahi-daemon), _ = fallback toute IP

    # ── Limite uploads ────────────────────────────────────────
    client_max_body_size 15M;

    # ── API Express (backend Node.js) ─────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Fichiers uploadés (statiques) ─────────────────────────
    location /uploads/ {
        alias   /opt/helpdesk/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Frontend React (SPA) ──────────────────────────────────
    location / {
        root       /opt/helpdesk/client/dist;
        try_files  $uri $uri/ /index.html;
        expires    1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Assets statiques — cache long terme
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        root       /opt/helpdesk/client/dist;
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # ── Logs ──────────────────────────────────────────────────
    access_log /var/log/nginx/helpdesk-access.log;
    error_log  /var/log/nginx/helpdesk-error.log;
}

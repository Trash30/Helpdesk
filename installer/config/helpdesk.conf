# ============================================================
# helpdesk.conf — Configuration de l'installateur Windows
# Modifiez ce fichier avant de lancer setup.bat
# ============================================================

# Répertoire d'installation
INSTALL_DIR=C:\HelpDesk

# Port du serveur backend (défaut : 3001)
SERVER_PORT=3001

# Port Nginx (défaut : 80)
NGINX_PORT=80

# Nom de l'application (affiché dans l'interface)
COMPANY_NAME=Mon Helpdesk

# URL publique (utilisée dans les emails)
# Laisser vide pour détection automatique (http://localhost:PORT)
APP_URL=

# SMTP — remplir pour activer les emails (reset mdp, enquêtes)
SMTP_HOST=
SMTP_PORT=587
SMTP_USER=
SMTP_PASS=
SMTP_FROM=

# Version Node.js (ne pas modifier sauf besoin spécifique)
NODE_VERSION=20.14.0

# Version PostgreSQL (ne pas modifier sauf besoin spécifique)
PG_VERSION=15
PG_INSTALLER_URL=https://get.enterprisedb.com/postgresql/postgresql-15.6-1-windows-x64.exe
